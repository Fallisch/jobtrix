name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jobtrix
          POSTGRES_PASSWORD: jobtrix
          POSTGRES_DB: jobtrix
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://jobtrix:jobtrix@localhost:5432/jobtrix
      # CI-Postgres läuft ohne Connection-Pooler, daher identisch mit DATABASE_URL.
      # Das Schema verlangt directUrl = env("DIRECT_DATABASE_URL") (Supabase Direct Connection).
      DIRECT_DATABASE_URL: postgresql://jobtrix:jobtrix@localhost:5432/jobtrix
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-test-secret-not-for-production-use-0123456789
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    defaults:
      run:
        working-directory: jobtrix

    steps:
      - uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: jobtrix/package-lock.json

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Migrations-Drift prüfen (Schema ↔ Migrationen)
        # Schlägt fehl, wenn das Prisma-Schema geändert wurde, ohne eine
        # passende Migration zu erzeugen (Ursache des P2022-500ers, Issue #193).
        # Nutzt eine SEPARATE Shadow-DB: migrate diff spielt alle Migrationen
        # dorthin und würde sonst die Haupt-DB befüllen (-> P3005 bei deploy).
        env:
          SHADOW_DATABASE_URL: postgresql://jobtrix:jobtrix@localhost:5432/prisma_shadow
        run: |
          PGPASSWORD=jobtrix psql -h localhost -U jobtrix -d jobtrix -c 'CREATE DATABASE prisma_shadow;' || true
          npx prisma migrate diff \
            --from-migrations prisma/migrations \
            --to-schema-datamodel prisma/schema.prisma \
            --shadow-database-url "$SHADOW_DATABASE_URL" \
            --exit-code

      - name: Prisma-Migrationen anwenden
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Jest-Tests
        run: npm test

      - name: Playwright-Browser installieren
        run: npx playwright install --with-deps chromium

      - name: App bauen
        run: npm run build

      - name: E2E-Tests (Playwright)
        # Vorerst non-blocking: Die E2E-Suite hinkt dem Auth-Flow hinterher
        # (Onboarding-Redirect, Dev-Mode-Form-Submit). Sanierung siehe #199.
        # CI bleibt grün, damit Drift-Guard, Jest und Build verlässlich gaten.
        continue-on-error: true
        run: npm run test:e2e

      - name: Playwright-Report hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: jobtrix/playwright-report/
          retention-days: 7
